<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Melad & Nay Wedding Invitation</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#F8F5F0;
  color:#7B5B45;
  overflow-x:hidden;
  overflow-y:auto;
  font-family:'Cinzel', serif;
  position:relative;
}

/* ================= GENERAL ================= */

section{
  width:100%;
  padding:100px 20px;
  position:relative;
  z-index:2;
}

h2{
  text-align:center;
  font-size:52px;
  margin-bottom:25px;
  color:#8A6A52;
  font-weight:500;
  letter-spacing:2px;
}

/* ================= HERO ================= */

.hero{
  height:100vh;
  background:
    linear-gradient(rgba(255,255,255,0.12), rgba(255,255,255,0.12)),
    url("background.jpg");
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:50%;
  animation:pulse 6s infinite;
}

/* ================= COUNTDOWN ================= */

.countdown{
  background:#F4ECE2;
  text-align:center;
  color:#7B5B45;
  position:relative;
  overflow:hidden;
}

.h3{
  color:#8A6A52;
}

.countdown-container{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-top:50px;
}

.box{
  width:180px;
  padding:35px 20px;
  border-radius:28px;
  background:#FFFFFF;
  border:1px solid rgba(123,91,69,0.08);
  transition:0.5s;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.box:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 0 30px rgba(123,91,69,0.12);
}

.box h3{
  font-size:58px;
  color:#8A6A52;
  margin-bottom:10px;
}

.box span{
  font-size:18px;
  letter-spacing:3px;
  color:#A17C61;
}

/* ================= LOCATION ================= */

.location{
  text-align:center;
  background:#FAF7F2;
}

.location-text{
  color:#9B775D;
  font-size:26px;
  line-height:2;
  margin-bottom:40px;
}

.map{
  max-width:950px;
  margin:auto;
  border-radius:28px;
  overflow:hidden;
  border:1px solid rgba(123,91,69,0.08);
  box-shadow:0 0 30px rgba(0,0,0,0.05);
}

iframe{
  width:100%;
  height:450px;
  border:0;

  /* مهم للموبايل */
  pointer-events:none;
}

/* ================= RSVP ================= */

.rsvp{
  background:#EFE5D8;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.rsvp-content{
  position:relative;
  z-index:2;
  max-width:850px;
  margin:auto;
  font-size:28px;
  line-height:2;
  color:#7B5B45;
}

/* ================= INPUT ================= */

.rsvp-form{
  margin-top:40px;
}

.rsvp-form input{
  width:100%;
  max-width:500px;
  padding:18px 24px;
  border:none;
  outline:none;
  border-radius:40px;
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(123,91,69,0.15);
  font-size:17px;
  color:#7B5B45;
  font-family:'Cinzel', serif;
  text-align:center;
}

/* ================= BUTTONS ================= */

.rsvp-buttons{
  margin-top:35px;
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
}

.rsvp-btn{
  padding:18px 38px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  text-decoration:none;
  font-size:15px;
  letter-spacing:2px;
  color:white;
  font-family:'Cinzel', serif;
  background:linear-gradient(
    135deg,
    #8A6A52,
    #B89A82
  );
  transition:0.4s ease;
}

.rsvp-btn:hover{
  transform:translateY(-5px) scale(1.03);
}

.rsvp-btn.outline{
  background:transparent;
  color:#8A6A52;
  border:1px solid rgba(123,91,69,0.25);
}

/* ================= SUCCESS MESSAGE ================= */

.success-message{
  margin-top:30px;
  font-size:22px;
  color:#8A6A52;
  opacity:0;
  transition:0.5s ease;
}

.success-message.show{
  opacity:1;
}

/* ================= LOCATION BUTTON ================= */

.location-btn{
  display:inline-block;
  margin-bottom:35px;
  padding:16px 34px;
  border-radius:40px;
  text-decoration:none;
  font-size:15px;
  letter-spacing:2px;
  color:white;
  background:linear-gradient(
    135deg,
    #8A6A52,
    #B89A82
  );
  transition:0.4s ease;
}

.location-btn:hover{
  transform:translateY(-5px) scale(1.03);
}

/* ================= ANIMATION ================= */

@keyframes pulse{

  0%{
    transform:scale(0.9);
    opacity:0.25;
  }

  50%{
    transform:scale(1);
    opacity:0.08;
  }

  100%{
    transform:scale(1.1);
    opacity:0;
  }

}

/* ================= MOBILE ================= */

@media(max-width:768px){

  section{
    padding:80px 18px;
  }

  h2{
    font-size:38px;
  }

  .box{
    width:140px;
    padding:25px 15px;
  }

  .box h3{
    font-size:42px;
  }

  .box span{
    font-size:15px;
  }

  .location-text{
    font-size:20px;
  }

  iframe{
    height:300px;
  }

  .rsvp-content{
    font-size:21px;
    line-height:1.8;
  }

  .rsvp-form input{
    font-size:15px;
    padding:16px 20px;
  }

  .rsvp-buttons{
    gap:18px;
  }

  .rsvp-btn{
    width:100%;
    max-width:320px;
    padding:16px 20px;
    font-size:14px;
  }

  .success-message{
    font-size:18px;
  }

}

</style>
</head>

<body>

<!-- ================= MUSIC ================= -->

<audio id="bgMusic" autoplay loop playsinline>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const music = document.getElementById("bgMusic");

window.addEventListener("load", () => {

  const playPromise = music.play();

  if(playPromise !== undefined){

    playPromise.catch(() => {

      document.addEventListener("click", startMusic, { once:true });
      document.addEventListener("touchstart", startMusic, { once:true });

    });

  }

});

function startMusic(){

  music.play().catch(() => {});

}

</script>

<!-- ================= HERO ================= -->

<section class="hero">
</section>

<!-- ================= COUNTDOWN ================= -->

<section class="countdown">

  <h2 class="h3">Countdown To Our Forever</h2>

  <div class="countdown-container">

    <div class="box">
      <h3 id="days">00</h3>
      <span>DAYS</span>
    </div>

    <div class="box">
      <h3 id="hours">00</h3>
      <span>HOURS</span>
    </div>

    <div class="box">
      <h3 id="minutes">00</h3>
      <span>MINUTES</span>
    </div>

    <div class="box">
      <h3 id="seconds">00</h3>
      <span>SECONDS</span>
    </div>

  </div>

</section>

<!-- ================= LOCATION ================= -->

<section class="location">

  <h2>Wedding Venue</h2>

  <div class="location-text">
    Shurfa Bay <br>
    Abu Dhabi
  </div>

  <div class="map">

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3631.5797426239474!2d54.3272245!3d24.465361900000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e5e65c4ed8c8b29%3A0xc4a3460a3a9c9092!2sShurfa%20Bay%20%E2%80%93%20Modern%20Levant%20Cuisine%20and%20Shisha%20Lounge!5e0!3m2!1sen!2seg!4v1779203703848!5m2!1sen!2seg"
      allowfullscreen=""
      loading="lazy">
    </iframe>

  </div>

  <br><br>

  <a
    href="https://maps.app.goo.gl/miHzWyGfARF7zs936"
    target="_blank"
    class="location-btn"
  >
    View Location
  </a>

</section>

<!-- ================= RSVP ================= -->

<section class="rsvp">

  <h2>RSVP</h2>

  <div class="rsvp-content">

    We would be delighted to celebrate with you <br>
    Kindly confirm your attendance

    <form id="rsvpForm" class="rsvp-form">

      <input
        type="text"
        id="guestName"
        placeholder="Enter Your Name"
        required
      >

      <div class="rsvp-buttons">

        <button
          type="button"
          class="rsvp-btn"
          onclick="sendRSVP('Attending')"
        >
          I Will Attend
        </button>

        <button
          type="button"
          class="rsvp-btn outline"
          onclick="sendRSVP('Not Attending')"
        >
          Sorry, Can't Make It
        </button>

      </div>

    </form>

    <div id="successMessage" class="success-message">
      Thank you for your response ✨
    </div>

  </div>

</section>

<!-- ================= COUNTDOWN ================= -->

<script>

const weddingDate = new Date("June 26, 2026 19:00:00").getTime();

const countdown = setInterval(function(){

  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));

  const hours = Math.floor(
    (distance % (1000 * 60 * 60 * 24)) /
    (1000 * 60 * 60)
  );

  const minutes = Math.floor(
    (distance % (1000 * 60 * 60)) /
    (1000 * 60)
  );

  const seconds = Math.floor(
    (distance % (1000 * 60)) / 1000
  );

  document.getElementById("days").innerHTML = days;
  document.getElementById("hours").innerHTML = hours;
  document.getElementById("minutes").innerHTML = minutes;
  document.getElementById("seconds").innerHTML = seconds;

}, 1000);

</script>

<!-- ================= AUTO SCROLL ================= -->

<script>

window.addEventListener("load", () => {

  setTimeout(() => {

    startAutoScroll();

  }, 2000);

});

function startAutoScroll(){

  const auto = setInterval(() => {

    window.scrollBy(0, 1);

    if(

      window.innerHeight + window.pageYOffset >=
      document.documentElement.scrollHeight - 2

    ){

      clearInterval(auto);

    }

  }, 18);

}

</script>

<!-- ================= RSVP ================= -->

<script>

async function sendRSVP(status){

  const guestName = document.getElementById("guestName").value;

  if(guestName.trim() === ""){

    alert("Please enter your name");
    return;

  }

  const scriptURL = "https://script.google.com/macros/s/AKfycbxhwCnLmpbZ2-8WvkhRaifbN7eCTWSEyB8BPmixUSrrudva6B7QSoAPIyvSAO2K_ffmOg/exec";

  const formData = new FormData();

  formData.append("name", guestName);
  formData.append("status", status);

  try{

    await fetch(scriptURL, {
  method:"POST",
  body:formData,
  mode:"no-cors"
});
    document
      .getElementById("successMessage")
      .classList.add("show");

    document.getElementById("guestName").value = "";

  }catch(error){

    alert("Something went wrong");

  }

}

</script>

</body>
</html>
